name: Compilando mi aplicacion

on:
  push:
    branches: # Este pipeline solo se ejecuta con un push en la rama main
     - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
      - run: npm run build